<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MangoToon — Comic Detail</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <div class="app-shell">

    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">M</div>
        <h1 class="sidebar-brand-title">MangoToon</h1>
      </div>

      <nav class="sidebar-nav">
        <a href="/">
          <span class="nav-icon">&#x1F4DA;</span>
          <span>Library</span>
        </a>
        <a href="/history">
          <span class="nav-icon">&#x23F3;</span>
          <span>History</span>
        </a>
        <a href="/settings">
          <span class="nav-icon">&#x2699;</span>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar">&#x1F464;</div>
          <div class="sidebar-user-info">
            <span class="sidebar-user-name">User</span>
            <span class="sidebar-user-tier">Local Mode</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Top Bar -->
      <header class="top-bar">
        <div class="top-bar-left">
          <a href="/" class="btn-secondary" style="text-decoration:none;display:flex;align-items:center;gap:6px;">
            <span>&#x2190;</span>
            <span>Back to Library</span>
          </a>
        </div>
        <div class="top-bar-right">
          <h2 id="detail-top-title" style="font-size:1.1rem;font-weight:600;color:var(--text-secondary);">Loading...</h2>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content-area">

        <!-- Loading -->
        <section id="detail-loading" class="library-loading" aria-label="Loading">
          <div class="spinner" aria-hidden="true"></div>
          <span>Loading comic...</span>
        </section>

        <!-- Error -->
        <section id="detail-error" class="reader-error" hidden>
          <p id="detail-error-msg">Comic not found.</p>
          <a href="/" class="btn-primary">Back to Library</a>
        </section>

        <!-- Detail content -->
        <div id="detail-content" class="detail-content" hidden>

          <!-- Hero Section -->
          <section class="detail-hero">
            <div class="detail-hero-cover">
              <img id="detail-cover" class="detail-cover" src="" alt="" hidden>
              <div id="detail-cover-placeholder" class="detail-cover-placeholder" hidden></div>
            </div>
            <div class="detail-hero-info">
              <div class="detail-hero-meta">
                <h1 id="detail-title-display" class="detail-title-display"></h1>
                <div id="detail-source" class="preview-source"></div>
                <span id="detail-status" class="status-badge"></span>
              </div>
              <p id="detail-description" class="detail-description-text" hidden></p>
              <div class="detail-hero-stats">
                <span id="detail-chapter-count">0 chapters</span>
                <span class="detail-stats-sep">&#x00B7;</span>
                <span id="detail-downloaded-count">0 downloaded</span>
              </div>
              <div id="detail-progress" class="detail-progress" hidden>
                <div class="detail-progress-bar">
                  <div id="detail-progress-fill" class="detail-progress-fill"></div>
                </div>
                <span id="detail-progress-text" class="detail-progress-text"></span>
              </div>
              <div id="detail-reading-progress" class="detail-reading-progress" hidden>
                <span id="detail-reading-text"></span>
              </div>
            </div>
          </section>

          <!-- Actions -->
          <section class="detail-actions">
            <button id="btn-detail-read" class="btn-primary">
              <span>&#x25B6;</span> Read
            </button>
            <button id="btn-detail-download-missing" class="btn-secondary">Download Missing</button>
            <button id="btn-detail-retry-failed" class="btn-secondary" hidden>Retry Failed</button>
            <button id="btn-detail-refresh" class="btn-secondary">Refresh Metadata</button>
            <button id="btn-detail-delete" class="btn-secondary detail-delete-btn">Delete</button>
          </section>

          <!-- Chapter List Header -->
          <section class="detail-chapters-header-bar">
            <h3>Chapters</h3>
            <div class="detail-chapters-controls">
              <input type="text" id="chapter-search" class="chapter-search-input" placeholder="Search chapters...">
              <select id="chapter-filter" class="chapter-filter-select">
                <option value="all">All</option>
                <option value="downloaded">Downloaded</option>
                <option value="not_downloaded">Missing</option>
                <option value="error">Error</option>
                <option value="partial">Partial</option>
              </select>
              <button id="chapter-sort" class="chapter-sort-btn" title="Toggle sort order">&#x2191;</button>
              <span id="detail-chapters-filter-count" class="sidebar-count"></span>
            </div>
          </section>

          <!-- Chapter List -->
          <section class="detail-chapters">
            <div id="detail-chapter-list" class="detail-chapter-list"></div>
            <div id="detail-no-chapters" class="detail-no-chapters" hidden>No chapters available.</div>
            <button id="chapter-show-more" class="chapter-show-more-btn" hidden>Show more</button>
          </section>
        </div>

      </div>

    </main>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden>
    <span id="toast-msg"></span>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/comic.js"></script>
</body>
</html>
