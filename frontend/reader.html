<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MangoToon — Reader</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="reader-page">

  <!-- Top bar (auto-hides while reading in paged mode) -->
  <header id="reader-top" class="reader-top">
    <a href="/" id="reader-back" class="reader-back-btn">&#x2190; Library</a>
    <div class="reader-info">
      <span id="reader-title" class="reader-manga-title"></span>
      <span id="reader-chapter-label" class="reader-chapter-label"></span>
    </div>
    <button id="btn-chapter-drawer" class="reader-ctrl-btn reader-drawer-toggle-btn" title="Chapter list" aria-label="Toggle chapter list">&#x2630;</button>
    <div class="reader-controls" id="reader-controls">
      <button id="btn-reader-mode" class="reader-ctrl-btn" title="Toggle reading mode" aria-label="Toggle reading mode">&#x25A6;</button>
      <button id="btn-zoom-out" class="reader-ctrl-btn" title="Zoom out" aria-label="Zoom out">&#x2212;</button>
      <button id="btn-zoom-reset" class="reader-ctrl-btn" title="Reset zoom" aria-label="Reset zoom">100%</button>
      <button id="btn-zoom-in" class="reader-ctrl-btn" title="Zoom in" aria-label="Zoom in">+</button>
      <button id="btn-fit" class="reader-ctrl-btn" title="Fit mode" aria-label="Change fit mode">&#x2296;</button>
      <button id="btn-fullscreen" class="reader-ctrl-btn" title="Fullscreen" aria-label="Toggle fullscreen">&#x26F6;</button>
    </div>
    <span id="reader-page-indicator" class="reader-page-indicator">— / —</span>
  </header>

  <!-- Reading area -->
  <main id="reader-main" class="reader-main">

    <!-- Tap zones (invisible overlays) -->
    <div id="zone-prev" class="reader-zone reader-zone-prev" role="button"
         aria-label="Previous page" tabindex="0"></div>
    <div id="zone-center" class="reader-zone reader-zone-center" role="button"
         aria-label="Toggle controls" tabindex="0"></div>
    <div id="zone-next" class="reader-zone reader-zone-next" role="button"
         aria-label="Next page" tabindex="0"></div>

    <!-- Page image (paged mode) -->
    <img id="reader-img" class="reader-img" src="" alt="Manga page" hidden>

    <!-- Vertical mode container -->
    <div id="reader-vertical-container" class="reader-vertical-container" hidden></div>

    <!-- Chapter complete overlay -->
    <div id="chapter-complete" class="chapter-complete-overlay" hidden>
      <div class="chapter-complete-box">
        <p class="chapter-complete-text">Chapter Complete</p>
        <button id="btn-next-chapter-overlay" class="btn-primary">Next Chapter</button>
      </div>
    </div>

    <!-- Loading indicator -->
    <div id="reader-loading" class="reader-loading" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
    </div>

    <!-- Error / empty state -->
    <div id="reader-error" class="reader-error" hidden>
      <p id="reader-error-msg">No downloaded chapters available.</p>
      <a href="/" class="btn-primary">Back to Library</a>
    </div>

  </main>

  <!-- Bottom bar (auto-hides while reading in paged mode) -->
  <footer id="reader-bottom" class="reader-bottom">
    <button id="btn-prev-chapter" class="reader-nav-btn" aria-label="Previous chapter">&#x2039; Ch</button>
    <select id="chapter-select" class="reader-chapter-select" aria-label="Select chapter"></select>
    <div class="reader-progress-wrap">
      <div id="reader-progress-bar" class="reader-progress-bar">
        <div id="reader-progress-fill" class="reader-progress-fill"></div>
      </div>
    </div>
    <button id="btn-next-chapter" class="reader-nav-btn" aria-label="Next chapter">Ch &#x203A;</button>
  </footer>

  <!-- Chapter drawer -->
  <div id="reader-drawer-overlay" class="reader-drawer-overlay" hidden></div>
  <div id="reader-drawer" class="reader-drawer" hidden>
    <div class="reader-drawer-header">
      <h2>Chapters</h2>
      <button id="btn-drawer-close" class="reader-drawer-close-btn" aria-label="Close">&times;</button>
    </div>
    <div class="reader-drawer-error" id="reader-drawer-error" hidden>
      <p id="reader-drawer-error-msg">Failed to load chapters.</p>
    </div>
    <div class="reader-drawer-list" id="reader-drawer-list"></div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/reader.js"></script>
</body>
</html>
