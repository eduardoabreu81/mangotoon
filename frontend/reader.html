<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ComicLib — Leitor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="reader-container">
    <header class="reader-header">
      <button onclick="window.close()">← Voltar</button>
      <h2 id="reader-title">Carregando...</h2>
      <button onclick="toggleFullscreen()">⛶</button>
    </header>

    <main class="reader-content" id="reader-content">
      <div class="reader-nav prev" id="btn-prev" onclick="navigatePage(-1)">‹</div>
      <img id="page-image" src="" alt="Página">
      <div class="reader-nav next" id="btn-next" onclick="navigatePage(1)">›</div>
    </main>

    <footer class="reader-footer">
      <select class="reader-chapter-select" id="chapter-select" onchange="goToChapter(this.value)"></select>
      <span class="reader-page-indicator" id="page-indicator">0 / 0</span>
    </footer>
  </div>

  <script src="js/reader.js"></script>
</body>
</html>
